<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <title>Recuperar senha — JasperRunner</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
    <style>
        body { background: #1a3554; }
        .login-card { max-width: 420px; border-radius: 12px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card login-card shadow-lg mx-auto">
    <div class="card-body p-4">

        <div class="text-center mb-4">
            <i class="bi bi-envelope-fill text-primary" style="font-size:2.5rem"></i>
            <h4 class="fw-bold mt-2 mb-0">Recuperar senha</h4>
            <p class="text-muted small">Informe seu usuário para receber o link por e-mail</p>
        </div>

        <form th:action="@{/password/forgot}" method="post" th:object="${forgotPasswordForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-4">
                <label for="username" class="form-label fw-semibold">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" id="username" class="form-control" th:field="*{username}"
                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                           required autofocus placeholder="Digite seu usuário">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-semibold mb-3">
                <i class="bi bi-send me-1"></i>Enviar link de recuperação
            </button>

            <div class="text-center">
                <a th:href="@{/login}" class="small text-decoration-none">
                    <i class="bi bi-arrow-left me-1"></i>Voltar ao login
                </a>
            </div>
        </form>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
