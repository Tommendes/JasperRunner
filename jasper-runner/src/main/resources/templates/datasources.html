<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Fontes de Dados')}"></head>
<body class="d-flex flex-column vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<div class="container-fluid flex-grow-1 overflow-auto p-4">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <h4 class="mb-0">
            <i class="bi bi-database-fill me-2 text-primary"></i>Fontes de Dados JDBC
        </h4>
        <a th:href="@{/datasources/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Nova Fonte de Dados
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light small text-muted">
                    <tr>
                        <th>Nome</th>
                        <th>Driver</th>
                        <th>URL</th>
                        <th>Usuário</th>
                        <th>Criado em</th>
                        <th width="180">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(datasources)}">
                        <td colspan="6" class="text-center text-muted py-5">
                            <i class="bi bi-database-x fs-2 d-block mb-2"></i>
                            Nenhuma fonte de dados cadastrada.
                        </td>
                    </tr>
                    <tr th:each="ds : ${datasources}">
                        <td>
                            <i class="bi bi-database me-1 text-primary"></i>
                            <strong th:text="${ds.name}"></strong>
                            <div class="small text-muted" th:text="${ds.description}"></div>
                        </td>
                        <td class="small text-muted" th:text="${ds.driverClassName}"></td>
                        <td class="small" th:text="${ds.url}"></td>
                        <td class="small text-muted" th:text="${ds.username}"></td>
                        <td class="small text-muted"
                            th:text="${T(com.seudominio.jasperrunner.util.AppTimeZone).formatStoredUtc(ds.createdAt)}"></td>
                        <td>
                            <!-- Testar Conexão -->
                            <button class="btn btn-sm btn-outline-info py-0 px-2"
                                    th:data-id="${ds.id}"
                                    onclick="testConnection(this)"
                                    title="Testar Conexão">
                                <i class="bi bi-lightning-charge"></i>
                            </button>
                            <!-- Editar -->
                            <a th:href="@{'/datasources/' + ${ds.id} + '/edit'}"
                               class="btn btn-sm btn-outline-secondary py-0 px-2 ms-1" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <!-- Excluir -->
                            <button class="btn btn-sm btn-outline-danger py-0 px-2 ms-1"
                                    th:data-id="${ds.id}"
                                    th:data-name="${ds.name}"
                                    onclick="confirmDelete(this)"
                                    title="Excluir">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- Modal resultado do teste -->
<div class="modal fade" id="testModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header py-2" id="testModalHeader">
                <h6 class="modal-title mb-0" id="testModalTitle">Teste de Conexão</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body small" id="testModalBody">Testando...</div>
        </div>
    </div>
</div>

<!-- Modal exclusão -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-danger">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>Confirmar Exclusão
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Excluir a fonte de dados <strong id="deleteDsName"></strong>?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <form id="deleteForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Excluir
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
<script>
    function testConnection(btn) {
        const id = btn.dataset.id;
        const modal = new bootstrap.Modal(document.getElementById('testModal'));
        const header = document.getElementById('testModalHeader');
        const body   = document.getElementById('testModalBody');
        const title  = document.getElementById('testModalTitle');

        header.className = 'modal-header py-2 bg-light';
        title.textContent = 'Testando Conexão...';
        body.textContent  = 'Aguarde...';
        modal.show();

        fetch('/datasources/' + id + '/test', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    header.className = 'modal-header py-2 bg-success text-white';
                    title.textContent = 'Conexão OK';
                } else {
                    header.className = 'modal-header py-2 bg-danger text-white';
                    title.textContent = 'Falha na Conexão';
                }
                body.textContent = data.message;
            })
            .catch(() => {
                header.className = 'modal-header py-2 bg-danger text-white';
                title.textContent = 'Erro';
                body.textContent = 'Não foi possível completar o teste.';
            });
    }

    function confirmDelete(btn) {
        document.getElementById('deleteDsName').textContent = btn.dataset.name;
        document.getElementById('deleteForm').action = '/datasources/' + btn.dataset.id + '/delete';
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }
</script>
</body>
</html>
