<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <title>Redefinir senha — JasperRunner</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
    <style>
        body { background: #1a3554; }
        .login-card { max-width: 420px; border-radius: 12px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card login-card shadow-lg mx-auto">
    <div class="card-body p-4">

        <div class="text-center mb-4">
            <i class="bi bi-key-fill text-primary" style="font-size:2.5rem"></i>
            <h4 class="fw-bold mt-2 mb-0">Nova senha</h4>
            <p class="text-muted small">Defina sua nova senha de acesso</p>
        </div>

        <div th:if="${error}" class="alert alert-danger py-2 small" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:if="${resetPasswordForm != null}"
              th:action="@{/password/reset}" method="post" th:object="${resetPasswordForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{token}">

            <div class="mb-3">
                <label for="newPassword" class="form-label fw-semibold">Nova senha</label>
                <input type="password" id="newPassword" class="form-control" th:field="*{newPassword}"
                       th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"
                       required placeholder="Mínimo 8 caracteres">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-semibold">Confirmar nova senha</label>
                <input type="password" id="confirmPassword" class="form-control" th:field="*{confirmPassword}"
                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                       required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-semibold mb-3">
                <i class="bi bi-check-lg me-1"></i>Redefinir senha
            </button>
        </form>

        <div class="text-center">
            <a th:href="@{/login}" class="small text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i>Voltar ao login
            </a>
        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
