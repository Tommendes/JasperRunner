<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Editar Relatório')}"></head>
<body class="d-flex flex-column vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<div class="container-fluid flex-grow-1 overflow-auto">
    <div class="row justify-content-center mt-4">
        <div class="col-12 col-lg-7 col-xl-5">

            <div class="d-flex align-items-center gap-2 mb-4">
                <a th:href="${report.folder != null ? '/folders/' + report.folder.id : '/'}"
                   class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h4 class="mb-0">
                    <i class="bi bi-pencil-square text-secondary me-2"></i>Editar Relatório
                </h4>
            </div>

            <div class="card shadow-sm">
                <div class="card-header fw-semibold">
                    <i class="bi bi-file-earmark-text me-2"></i>
                    <span th:text="${report.name}">Metadados</span>
                </div>
                <div class="card-body">
                    <form th:action="@{'/reports/' + ${report.id} + '/edit'}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">
                                Nome <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="name" name="name" class="form-control"
                                   th:value="${report.name}" required>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label fw-semibold">Descrição</label>
                            <textarea id="description" name="description" class="form-control" rows="3"
                                      th:text="${report.description}"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-muted">Arquivo JRXML</label>
                            <input type="text" class="form-control form-control-sm"
                                   th:value="${report.jrxmlPath}" readonly disabled>
                            <div class="form-text">O caminho do arquivo não pode ser alterado aqui.</div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="${report.folder != null ? '/folders/' + report.folder.id : '/'}"
                               class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-floppy me-1"></i>Salvar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
