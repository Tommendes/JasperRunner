<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Perfil')}"></head>
<body class="d-flex flex-column vh-100">

<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: alerts}"></div>

<main class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <h4 class="mb-4"><i class="bi bi-person-gear me-2"></i>Meu Perfil</h4>

            <div class="card shadow-sm mb-4">
                <div class="card-header fw-semibold">Dados pessoais</div>
                <div class="card-body">
                    <form th:action="@{/profile}" method="post" th:object="${profileForm}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label class="form-label">Usuário</label>
                            <input type="text" class="form-control" th:value="${user.username}" disabled>
                        </div>

                        <div class="mb-3">
                            <label for="name" class="form-label">Nome</label>
                            <input type="text" id="name" class="form-control" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" id="email" class="form-control" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>Salvar alterações
                        </button>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Alterar senha</div>
                <div class="card-body">
                    <form th:action="@{/profile/change-password}" method="post" th:object="${changePasswordForm}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="currentPassword" class="form-label">Senha atual</label>
                            <input type="password" id="currentPassword" class="form-control"
                                   th:field="*{currentPassword}"
                                   th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Nova senha</label>
                            <input type="password" id="newPassword" class="form-control"
                                   th:field="*{newPassword}"
                                   th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'">
                            <div class="form-text">Mínimo de 8 caracteres.</div>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirmar nova senha</label>
                            <input type="password" id="confirmPassword" class="form-control"
                                   th:field="*{confirmPassword}"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                        </div>

                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-key me-1"></i>Alterar senha
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
