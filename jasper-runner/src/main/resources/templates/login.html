<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <title>Login — JasperRunner</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
    <style>
        body { background: #1a3554; }
        .login-card { max-width: 380px; border-radius: 12px; }
        .login-brand { color: #fff; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card login-card shadow-lg mx-auto">
    <div class="card-body p-4">

        <!-- Logo -->
        <div class="text-center mb-4">
            <i class="bi bi-bar-chart-fill text-primary" style="font-size:2.5rem"></i>
            <h4 class="fw-bold mt-2 mb-0">JasperRunner</h4>
            <p class="text-muted small">Acesse com suas credenciais</p>
        </div>

        <!-- Alerta de erro -->
        <div th:if="${param.error}"
             class="alert alert-danger py-2 small" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>
            Usuário ou senha inválidos.
        </div>

        <!-- Alerta de logout -->
        <div th:if="${param.logout}"
             class="alert alert-success py-2 small" role="alert">
            <i class="bi bi-check-circle-fill me-1"></i>
            Você saiu com sucesso.
        </div>

        <!-- Mensagem de sucesso (ex.: senha redefinida) -->
        <div th:if="${success}"
             class="alert alert-success py-2 small" role="alert">
            <i class="bi bi-check-circle-fill me-1"></i>
            <span th:text="${success}"></span>
        </div>

        <!-- Formulário -->
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" id="username" name="username"
                           class="form-control" required autofocus
                           placeholder="Digite seu usuário">
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" name="password"
                           class="form-control" required
                           placeholder="Digite sua senha">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
            </button>

            <div class="text-center mt-3">
                <a th:href="@{/password/forgot}" class="small text-decoration-none">
                    Esqueceu sua senha?
                </a>
            </div>
        </form>

    </div>
    <div class="card-footer text-center text-muted small py-2 bg-light">
        Vivazul Smart Solutions &copy; 2026
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
