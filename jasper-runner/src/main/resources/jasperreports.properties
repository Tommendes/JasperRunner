# Evita falha em ambiente Linux/VPS quando fontes do template (ex: Calibri) nao existem no host.
net.sf.jasperreports.awt.ignore.missing.font=true

# Fallback global de fonte quando a fonte solicitada nao estiver disponivel.
net.sf.jasperreports.default.font.name=DejaVu Sans

# Mapeamento padrao para exportacao PDF.
net.sf.jasperreports.default.pdf.font.name=Helvetica
net.sf.jasperreports.default.pdf.encoding=Cp1252
net.sf.jasperreports.default.pdf.embedded=false
