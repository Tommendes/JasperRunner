server:
  port: 8090

spring:
  jackson:
    time-zone: America/Recife
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:jasper_runner}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  jpa:
    # MariaDB no Easypanel: evita "Unknown column 'RESERVED'" e falha ao criar tabelas
    database-platform: ${JPA_DATABASE_PLATFORM:org.hibernate.dialect.MariaDBDialect}
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        boot:
          allow_jdbc_metadata_access: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  thymeleaf:
    cache: false
  mail:
    host: ${MAILER_HOST:smtp.hostinger.com}
    port: ${MAILER_PORT:465}
    username: ${MAILER_USER:}
    password: ${MAILER_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${MAILER_SECURE:true}
          starttls:
            enable: false

jasperrunner:
  reports-root-path: ${JASPERRUNNER_REPORTS_ROOT_PATH:./reports}
  admin-user: admin
  admin-password: changeme
  admin-name: Administrator
  admin-email: admin@localhost
  base-url: ${APP_BASE_URL:http://localhost:8090}
  password-reset-expiration-minutes: 30
  encryption-key: JasperRunner@2024$SecretKey!

logging:
  level:
    com.seudominio.jasperrunner: DEBUG
    net.sf.jasperreports: WARN
    org.springframework.security: WARN
  file:
    name: ${LOGGING_FILE_NAME:./logs/jasper-runner.log}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
